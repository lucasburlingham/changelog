services:
  php:
    build: .
    env_file:
      - .env
    volumes:
      - ./src:/var/www/html
      - ./src/data:/var/www/html/data
    restart: unless-stopped
    networks:
      - changelog-network

  cloudflare-tunnel:
    depends_on:
      - php
    image: cloudflare/cloudflared:latest
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - changelog-network

networks:
  changelog-network:
    driver: bridge

