; php-app custom php.ini (development defaults)
; Place this file at php-app/php.ini — Dockerfile copies it into the image.

[PHP]
; error handling
error_reporting = E_ALL
display_errors = On
display_startup_errors = On

; timezone
date.timezone = UTC

; extensions (these are enabled in the Docker image by docker-php-ext-install)
extension_dir = "C:\Users\LucasBurlingham\AppData\Local\Microsoft\WinGet\Packages\PHP.PHP.8.5_Microsoft.Winget.Source_8wekyb3d8bbwe\ext"
extension=pdo_sqlite
extension=sqlite3

; performance / upload limits
memory_limit = 256M
upload_max_filesize = 10M
post_max_size = 12M
max_execution_time = 60

; production reminder: set display_errors = Off
